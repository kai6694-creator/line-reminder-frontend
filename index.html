<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>濾心更換提醒</title><script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:sans-serif;background:#f0f7ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{background:white;border-radius:20px;padding:32px 24px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08)}.hd{text-align:center;margin-bottom:28px}.hd .ic{font-size:48px}.hd h1{font-size:22px;font-weight:700;color:#1a1a2e;margin-top:8px}.hd p{font-size:14px;color:#888;margin-top:4px}label{display:block;font-size:14px;font-weight:600;color:#444;margin-bottom:6px;margin-top:16px}select,input{width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;color:#333;outline:none;background:#fafafa}.hint{font-size:12px;color:#aaa;margin-top:5px}.btn{width:100%;margin-top:28px;padding:14px;background:linear-gradient(135deg,#2196F3,#1565C0);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}.btn:disabled{background:#ccc}.ok{display:none;text-align:center;padding:20px}#ld{text-align:center;padding:40px;color:#888}</style></head><body><div class="card">  <div id="ld">⏳ 正在連線 LINE...</div>  <div id="fm" style="display:none">    <div class="hd">      <div class="ic">💧</div>      <h1>濾心更換提醒</h1>      <p>設定後，LINE 會在到期前通知您</p>    </div>    <label>選擇濾心型號</label>    <select id="prod">      <option value="30">MAXTRA+ （每 4 週更換）</option>      <option value="90">MAXTRA PRO （每 3 個月）</option>      <option value="180">ON TAP 龍頭式 （每 6 個月）</option>    </select>    <p class="hint">不確定型號？請參考包裝盒說明</p>    <label>上次更換濾心的日期</label>    <input type="date" id="dt">    <p class="hint">全新濾心請選今天</p>    <button class="btn" id="btn" onclick="go()">✅ 設定提醒</button>  </div>  <div class="ok" id="ok">    <div style="font-size:60px">🎉</div>    <h2 style="font-size:20px;color:#2e7d32;margin-top:12px">提醒設定成功！</h2>    <p id="msg" style="font-size:14px;color:#666;margin-top:8px">我們會在到期前 3 天透過 LINE 通知您。</p>  </div></div><script>const LIFF_ID="2009728428-SfuyDoV1";const BACKEND="https://line-reminder-backend.onrender.com";let uid="";(async()=>{  try{    await liff.init({liffId:LIFF_ID});    if(!liff.isLoggedIn()){liff.login();return;}    const p=await liff.getProfile();    uid=p.userId;    document.getElementById("dt").value=new Date().toISOString().split("T")[0];    document.getElementById("ld").style.display="none";    document.getElementById("fm").style.display="block";  }catch(e){    document.getElementById("ld").innerHTML="❌ 初始化失敗："+e.message;  }})();async function go(){  const prod=document.getElementById("prod").value;  const last=document.getElementById("dt").value;  if(!last){alert("請選日期！");return;}  const d=new Date(last);  d.setDate(d.getDate()+parseInt(prod));  const next=d.toISOString().split("T")[0];  const btn=document.getElementById("btn");  btn.disabled=true;btn.textContent="⏳ 儲存中...";  try{    const r=await fetch(BACKEND+"/api/reminder",{      method:"POST",      headers:{"Content-Type":"application/json"},      body:JSON.stringify({userId:uid,nextDate:next,productDays:parseInt(prod)})    });    if(!r.ok)throw new Error("伺服器錯誤");    document.getElementById("fm").style.display="none";    document.getElementById("ok").style.display="block";    document.getElementById("msg").textContent="下次到期日："+next+"，我們會提前 3 天通知您。";  }catch(e){    alert("儲存失敗："+e.message);    btn.disabled=false;btn.textContent="✅ 設定提醒";  }}</script></body></html>
